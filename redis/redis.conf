# ═════════════════════════════════════════════════════════════════════════════
# redis.conf — Redis Configuration for DevOpsHub Project
# ═════════════════════════════════════════════════════════════════════════════
#
# This file customizes how Redis behaves inside its container.
# Redis works perfectly without a config file, but having one gives us:
#   - Explicit control over persistence
#   - Easier debugging
#   - Production-like setup
# ─────────────────────────────────────────────────────────────────────────────

# ── Persistence: RDB Snapshots ────────────────────────────────────────────
#
# Redis can save data to disk using two mechanisms:
#   1. RDB (Redis Database) — Point-in-time snapshots
#   2. AOF (Append-Only File) — Log of every write command
#
# We enable BOTH for maximum durability.
#
# save <seconds> <changes>
# → Save if at least <changes> writes happen within <seconds>
#
# save 900 1   → Save every 15 minutes if at least 1 key changed
# save 300 10  → Save every 5 minutes if at least 10 keys changed
# save 60 10000 → Save every 60 seconds if 10,000 keys changed (high traffic)
save 900 1
save 300 10
save 60 10000

# ── AOF (Append-Only File) Persistence ────────────────────────────────────
#
# AOF logs every write command to a file.
# On restart, Redis replays the AOF file to restore data.
# More durable than RDB alone — can recover to the last second.
#
# appendonly yes → Enable AOF
appendonly yes

# appendfilename → The name of the AOF file
appendfilename "appendonly.aof"

# appendfsync → How often to flush AOF to disk
#   always   → After every write (safest, slowest)
#   everysec → Once per second (good balance — default recommendation)
#   no       → Let OS decide (fastest, least safe)
appendfsync everysec

# ── Data Directory ────────────────────────────────────────────────────────
#
# dir → Where Redis stores RDB and AOF files inside the container.
# We set this to /data, which is where we mount the Docker volume.
# Without this, Redis saves to /var/lib/redis or the working dir.
dir /data

# ── Logging ───────────────────────────────────────────────────────────────
#
# loglevel → Controls verbosity of Redis logs
#   debug   → Very verbose (for debugging)
#   verbose → More than notice
#   notice  → Moderately verbose (production standard)
#   warning → Only critical warnings
loglevel notice

# ── Memory ────────────────────────────────────────────────────────────────
#
# maxmemory → Maximum RAM Redis can use. 0 = unlimited (use full system RAM).
# For this project we set a reasonable limit to prevent memory issues.
# In production, set this based on your server's available RAM.
maxmemory 256mb

# maxmemory-policy → What to do when memory limit is reached.
# allkeys-lru → Remove the least recently used key from ANY key set.
# This ensures Redis always has room for new data.
maxmemory-policy allkeys-lru

# ── Binding ───────────────────────────────────────────────────────────────
#
# bind 0.0.0.0 → Accept connections from any IP (required in Docker).
# By default, Redis only listens on 127.0.0.1 (localhost).
# Inside a container, "localhost" means the container itself,
# so other containers cannot reach Redis without this setting.
bind 0.0.0.0

# protected-mode no → Disables the protection that requires authentication
# when Redis is exposed publicly. Safe within our private Docker network.
protected-mode no
